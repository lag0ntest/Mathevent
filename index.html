<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Math Championship</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --success: #10b981;
            --text: #f8fafc;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .hidden { display: none !important; }

        h1 { color: var(--accent); margin-bottom: 10px; }
        
        .timer {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ef4444;
            margin: 20px 0;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover { background: #2563eb; }
        
        .math-box {
            font-size: 3rem;
            margin: 30px 0;
            font-weight: bold;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .admin-table th, .admin-table td {
            padding: 10px;
            border: 1px solid #475569;
            text-align: left;
        }
        .admin-table th { background: #334155; }
        
        .admin-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <!-- 1. COUNTDOWN SCREEN -->
    <div id="countdown-screen" class="container">
        <h1>Event Starting Soon</h1>
        <p>Prepare your scratch paper! The race begins in:</p>
        <div id="timer" class="timer">00:28:00</div>
        <button onclick="showScreen('auth-screen')">Pre-Register / Login</button>
    </div>

    <!-- 2. AUTHENTICATION SCREEN -->
    <div id="auth-screen" class="container hidden">
        <h1 id="auth-title">Create Account</h1>
        <input type="text" id="username" placeholder="Choose Username" required>
        <input type="password" id="password" placeholder="Choose Password" required>
        <button id="auth-btn" onclick="handleAuth()">Register & Join</button>
        <p style="font-size: 0.9rem; color: #94a3b8; cursor: pointer; margin-top: 15px;" onclick="toggleAuthMode()">
            Already registered? Switch to Login
        </p>
    </div>

    <!-- 3. GAMEPLAY SCREEN -->
    <div id="game-screen" class="container hidden">
        <div class="score-board">
            <span>User: <strong id="player-name">---</strong></span>
            <span>Score: <strong id="score-val">0</strong></span>
        </div>
        <hr style="border-color: #475569;">
        <div class="math-box" id="problem">2 &times; 2</div>
        <input type="number" id="answer" placeholder="Your answer..." autocomplete="off">
        <button onclick="checkAnswer()">Submit</button>
    </div>

    <!-- 4. ADMIN DASHBOARD -->
    <div id="admin-screen" class="container hidden" style="max-width: 750px;">
        <h1>Admin Control Panel</h1>
        <p>Live Competitor Accounts &amp; Scores</p>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Score (Points)</th>
                </tr>
            </thead>
            <tbody id="admin-list">
                <!-- Live data from database will go here -->
            </tbody>
        </table>
        
        <div class="admin-actions">
            <button onclick="testEventEarly()" style="background: var(--success);">⚡ Test Event Early (Force Start)</button>
            <button onclick="showScreen('countdown-screen')" style="background: #475569;">Back to Main</button>
        </div>
    </div>

    <!-- FIREBASE MODULES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your exact Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDeuqiNAi9-txcC4yToqnaM26S22seOuJI",
            authDomain: "iqmathevent.firebaseapp.com",
            projectId: "iqmathevent",
            storageBucket: "iqmathevent.firebasestorage.app",
            messagingSenderId: "1036883993320",
            appId: "1:1036883993320:web:ab4213f6297793a58a5f5d",
            measurementId: "G-Y4Z0YMMNZW"
        };

        // Initialize Firebase Realtime Database
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Your custom Admin credentials
        const ADMIN_USER = "Lag0n";
        const ADMIN_PASS = "Lag0nadmin145";

        // TARGET START TIME: 11:30 AM Today
        let targetTime = new Date();
        targetTime.setHours(11, 30, 0, 0);

        let currentUser = null;
        let score = 0;
        let currentCorrectAnswer = 0;
        let isLoginMode = false;
        let eventForceStarted = false;

        // 1. TIMING ENGINE
        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetTime.getTime() - now;

            if (distance <= 0 || eventForceStarted) {
                document.getElementById("timer").innerHTML = "EVENT LIVE!";
                clearInterval(timerInterval);
                if (currentUser && currentUser !== ADMIN_USER) showScreen('game-screen');
                return;
            }

            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
        const timerInterval = setInterval(updateTimer, 1000);
        updateTimer();

        // 2. INTERFACE NAV
        window.showScreen = function(screenId) {
            ['countdown-screen', 'auth-screen', 'game-screen', 'admin-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
            if (screenId === 'game-screen') generateProblem();
            if (screenId === 'admin-screen') listenToLeaderboard();
        }

        window.toggleAuthMode = function() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Login to Event" : "Create Account";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Login" : "Register & Join";
        }

        // 3. DATABASE PURE USERNAME AUTH LOGIC
        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if (!user || !pass) return alert("Please fill out all fields.");

            // Check if it's the Admin logging in
            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                currentUser = ADMIN_USER;
                return showScreen('admin-screen');
            }

            const dbRef = ref(db);

            try {
                const snapshot = await get(child(dbRef, `players/${user}`));
                
                if (isLoginMode) {
                    // Login Mode
                    if (snapshot.exists()) {
                        const playerData = snapshot.val();
                        if (playerData.password === pass) {
                            currentUser = user;
                            score = playerData.score || 0;
                        } else {
                            return alert("Incorrect password!");
                        }
                    } else {
                        return alert("Username does not exist! Please create an account.");
                    }
                } else {
                    // Registration Mode
                    if (snapshot.exists()) {
                        return alert("Username is already taken! Please choose another one.");
                    } else {
                        // Create user account straight in the Database root
                        await set(ref(db, 'players/' + user), {
                            username: user,
                            password: pass,
                            score: 0
                        });
                        currentUser = user;
                        score = 0;
                    }
                }

                document.getElementById('player-name').innerText = currentUser;
                document.getElementById('score-val').innerText = score;

                if (new Date() >= targetTime || eventForceStarted) {
                    showScreen('game-screen');
                } else {
                    alert("Account registered successfully! Waiting for event launch.");
                    showScreen('countdown-screen');
                }

            } catch (error) {
                alert("Database Error: " + error.message);
            }
        }

        // 4. MATH LOGIC ENGINE (STRICT MULTIPLICATION)
        function generateProblem() {
            const num1 = Math.floor(Math.random() * 11) + 2; // 2 to 12
            const num2 = Math.floor(Math.random() * 11) + 2; // 2 to 12

            document.getElementById('problem').innerHTML = `${num1} &times; ${num2}`;
            currentCorrectAnswer = num1 * num2;
            
            document.getElementById('answer').value = '';
            document.getElementById('answer').focus();
        }

        window.checkAnswer = async function() {
            const userAns = parseInt(document.getElementById('answer').value);
            if (userAns === currentCorrectAnswer) {
                score++;
                document.getElementById('score-val').innerText = score;
                
                await update(ref(db, 'players/' + currentUser), {
                    score: score
                });
            }
            generateProblem();
        }

        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });

        // 5. LIVE ADMIN PANELS LISTENER
        function listenToLeaderboard() {
            const tbody = document.getElementById('admin-list');
            
            onValue(ref(db, 'players'), (snapshot) => {
                tbody.innerHTML = '';
                const data = snapshot.val();
                if (!data) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;">No players registered yet</td></tr>`;
                    return;
                }

                const players = Object.keys(data).map(key => data[key]).sort((a, b) => b.score - a.score);

                players.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${p.username}</td>
                        <td style="font-family: monospace; color: #94a3b8;">${p.password}</td>
                        <td style="font-weight:bold; color:var(--success);">${p.score} pts</td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        // 6. ADMIN FORCE START
        window.testEventEarly = function() {
            eventForceStarted = true;
            alert("Dev Mode Enabled: Countdown bypassed. Users can now play right away!");
            showScreen('countdown-screen');
        }
    </script>
</body>
</html>
